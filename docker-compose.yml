services:
  postgres:
    image: postgres:16-alpine
    container_name: fantasy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fantasy_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5437}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fantasy_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fantasy-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fantasy_ai}?schema=public
      AI_SERVICE_URL: http://ai-service:${AI_SERVICE_PORT:-8001}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    container_name: fantasy-ai-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${AI_SERVICE_PORT:-8001}
    ports:
      - "${AI_SERVICE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: